<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HP Robots Otto TUMO Lab Guide</title>
https://fonts.cdnfonts.com/css/forma-djr-text
<style>
body{margin:0;font-family:'Forma DJR Text', Arial;background:linear-gradient(135deg,#eef4ff,#f5ecff)}
.header{position:fixed;top:0;width:100%;background:white;padding:14px 20px;box-shadow:0 2px 18px rgba(0,0,0,0.12);z-index:1000}
.header-top{display:flex;justify-content:center;align-items:center;gap:12px;text-align:center}
.brand{display:flex;align-items:center;gap:12px}
.logo-wrapper{width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#0070f3;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
.logo-wrapper svg{width:38px;height:38px}
.subtitle{font-size:.9rem;color:#555}
.filters,.session-filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.filters button,.session-filters button{background:#eee;color:#222;padding:8px 14px;border-radius:999px;border:1px solid transparent;transition:all .2s ease}
.filters button.active,.session-filters button.active{background:#0070f3;color:#fff;border-color:#0070f3;box-shadow:0 6px 16px rgba(0,112,243,.18)}
.navTop{display:flex;justify-content:center;gap:20px;margin-top:10px}
.container{max-width:900px;margin:200px auto 40px;padding:20px}
.card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 18px 45px rgba(42,55,80,.08);min-height:450px}
.activity-list,.material-list,#resources{padding-left:20px;margin:10px 0 20px}
.activity-list li,.material-list li,#resources li{margin-bottom:8px;line-height:1.5}
img{width:100%;height:240px;object-fit:cover;border-radius:16px}
h1{color:#0070f3}
button{padding:10px 18px;border:none;border-radius:12px;cursor:pointer;background:#0070f3;color:#fff;transition:.2s}
button:hover{opacity:.95}
.progress-bar{height:8px;background:#eee;border-radius:999px;overflow:hidden;margin-bottom:20px}
.progress{height:100%;background:#0070f3;border-radius:999px;width:0%}
@media (max-width:640px){.container{margin-top:260px;padding:16px}.header{padding:12px 14px}.logo-wrapper{width:40px;height:40px}.header-top{gap:10px}.filters button,.session-filters button{padding:8px 10px;font-size:.9rem}} 
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <span class="logo-wrapper" aria-label="HP Robots logo">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img">
          <circle cx="60" cy="60" r="56" fill="#0070f3"/>
          <path d="M34 74c0-14 8-24 26-24s26 10 26 24" fill="#fff"/>
          <path d="M46 46h28v8H46z" fill="#fff"/>
          <circle cx="46" cy="38" r="8" fill="#fff"/>
          <circle cx="74" cy="38" r="8" fill="#fff"/>
          <circle cx="60" cy="58" r="6" fill="#0070f3"/>
        </svg>
      </span>
      <div>
        <div>HP Robots TUMO Lab</div>
        <div class="subtitle">Agenda & session guide</div>
      </div>
    </div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="session-filters" id="sessionFilters"></div>

</div>

<div class="container">
<div class="progress-bar"><div id="progressBar" class="progress"></div></div>
<div class="card">
<div class="navTop">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>
<h2 id="session"></h2>
<h3 id="time"></h3>
<h1 id="title"></h1>
<img id="img">

<p id="content"></p>
<p><b>🎯 Goal:</b> <span id="goal"></span></p>
<div><b>📋 Activities:</b>
  <ul id="activities" class="activity-list"></ul>
</div>
<div><b>🧰 Materials:</b>
  <ul id="materials" class="material-list"></ul>
</div>
<div id="resourcesBlock">
  <b>🔗 Resources:</b>
  <ul id="resources"></ul>
</div>
<button onclick="toggle()" id="progressBtn">Mark Done</button>
<p><b>📝 Notes:</b> <span id="notes"></span></p>
</div>
</div>

let index=0;
let filter='All';
let selectedSession=null;
let progress={};
const sessionNames = slides.filter(s=>s.session.startsWith('Session')).map(s=>s.session);

function renderFilters(){
  const f=document.getElementById('filters');
  f.innerHTML='';
  ['All','Day 1','Day 2','Day 3'].forEach(d=>{
    const b=document.createElement('button');
    b.innerText=d;
    b.className = !selectedSession && filter===d ? 'active' : '';
    b.onclick = ()=>{ filter=d; selectedSession=null; index=0; render(); };
    f.appendChild(b);
  });

  const sf=document.getElementById('sessionFilters');
  sf.innerHTML='';
  const resetBtn=document.createElement('button');

  resetBtn.onclick = ()=>{ selectedSession=null; filter='All'; index=0; render(); };
  sf.appendChild(resetBtn);

  sessionNames.forEach(name=>{
    const b=document.createElement('button');
    b.innerText = name.replace('Session ','S');
    b.className = selectedSession===name ? 'active' : '';
    b.onclick = ()=>{ selectedSession=name; filter='All'; index=0; render(); };
    sf.appendChild(b);
  });
}

function visible(){
  let list = slides;
  if(filter !== 'All') list = list.filter(s=>s.day===filter);
  if(selectedSession) list = list.filter(s=>s.session===selectedSession);
  return list;
}

function normalizeList(text){
  return text ? text.split(/\s*[;,]\s*|\n/).map(t=>t.trim()).filter(Boolean) : [];
}

function render(){
  renderFilters();
  const data = visible();
  if(index >= data.length) index = 0;
  const s = data[index] || slides[0];
  const globalKey = slides.indexOf(s);

  document.getElementById('title').innerText = s.title;
  document.getElementById('session').innerText = s.day + ' | ' + s.session;
  document.getElementById('time').innerText = s.time;
  document.getElementById('content').innerText = s.content;
  document.getElementById('goal').innerText = s.goal;
  document.getElementById('notes').innerText = s.notes;
  document.getElementById('img').src = s.img;

  const activities = document.getElementById('activities');
  activities.innerHTML = '';
  const activityItems = normalizeList(s.outcome);
  if(activityItems.length){
    activityItems.forEach(a=>{ const li = document.createElement('li'); li.innerText = a; activities.appendChild(li); });
  } else {
    const li = document.createElement('li'); li.innerText = 'No activities listed'; activities.appendChild(li);
  }

  const materials = document.getElementById('materials');
  materials.innerHTML = '';
  if(s.materials && s.materials.length){
    s.materials.forEach(m=>{ const li = document.createElement('li'); li.innerText = m; materials.appendChild(li); });
  } else {
    const li = document.createElement('li'); li.innerText = 'None'; materials.appendChild(li);
  }

  const list = document.getElementById('resources');
  list.innerHTML='';
  if(s.resources && s.resources.length){
    s.resources.forEach(r=>{ const li = document.createElement('li'); li.innerHTML = `<a href='${r}' target='_blank'>${r}</a>`; list.appendChild(li); });
  }

  const done = Object.values(progress).filter(v=>v).length;
  document.getElementById('progressBar').style.width = (done / slides.length * 100) + '%';
  document.getElementById('progressBtn').innerText = progress[globalKey] ? '✅ Completed' : '☐ Mark Done';
}

function next(){
  const list = visible();
  if(!list.length) return;
  index = Math.min(index + 1, list.length - 1);
  render();
}
function prev(){
  const list = visible();
  if(!list.length) return;
  index = Math.max(index - 1, 0);
  render();
}
function toggle(){
  const data = visible();
  const s = data[index];
  if(!s) return;
  const key = slides.indexOf(s);
  progress[key] = !progress[key];
  render();
}

window.addEventListener('keydown', e=>{
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
});

let touchStartX = null;
let touchStartY = null;
document.addEventListener('touchstart', e=>{
  if(e.touches.length === 1){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
});
document.addEventListener('touchend', e=>{
  if(touchStartX === null || touchStartY === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next(); else prev();
  }
  touchStartX = null;
  touchStartY = null;
});

render();
</script>

</body>
</html>
